name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for SonarCloud blame data

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make cppcheck unzip \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev \
            libxinerama-dev libxcursor-dev \
            libc6-i386
          pip install flawfinder gcovr

      - name: Build raylib
        run: |
          curl -L https://github.com/raysan5/raylib/archive/refs/tags/6.0.tar.gz | tar -xz
          make -C raylib-6.0/src PLATFORM=PLATFORM_DESKTOP

      - name: Install SonarCloud build-wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q build-wrapper.zip
          sudo find build-wrapper-linux-x86 -maxdepth 1 -type f -exec cp {} /usr/local/bin/ \;
          sudo ln -sf /usr/local/bin/build-wrapper-linux-x86-64 /usr/local/bin/build-wrapper

      - name: Build game (via build-wrapper)
        run: build-wrapper --out-dir bw-output make RAYLIB=$PWD/raylib-6.0

      - name: Run tests and collect coverage
        run: |
          make test
          gcovr --root . --filter 'src/.*' --sonarqube -o coverage.xml

      - name: Lint
        run: make lint

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
