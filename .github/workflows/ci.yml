name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make cppcheck \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev \
            libxinerama-dev libxcursor-dev
          pip install flawfinder

      - name: Build raylib
        run: |
          curl -L https://github.com/raysan5/raylib/archive/refs/tags/6.0.tar.gz | tar -xz
          make -C raylib-6.0/src PLATFORM=PLATFORM_DESKTOP

      - name: Build game
        run: make RAYLIB=$PWD/raylib-6.0

      - name: Lint
        run: make lint
